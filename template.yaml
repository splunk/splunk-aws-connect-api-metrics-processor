AWSTemplateFormatVersion: '2010-09-09'
Transform: 'AWS::Serverless-2016-10-31'
Description: Get Amazon Connect real-time and historic metric data from Connect REST endpoints
Metadata:
  AWS::ServerlessRepo::Application:
    Name: splunk-amazon-connect-api-metrics-processor
    Description: Get Amazon Connect real-time and historic metric data from Connect REST endpoints
    Author: Splunk
    SpdxLicenseId: MIT
    LicenseUrl: LICENSE
    ReadmeUrl: README.md
    SemanticVersion: 0.0.3
    SourceCodeUrl: https://github.com/splunk/splunk-aws-connect-api-metrics-processor
Resources:
  MetricsProcessor:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: MetricsProcessor
      Handler: lambda_function.lambda_handler
      Runtime: python3.8
      Description: Get Amazon Connect real-time and historic metric data from Connect REST endpoints
      MemorySize: 128
      Timeout: 60
  Policies:
    - Version: "2012-10-17"
      Statement:

        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource: "*"

        - Effect: Allow
          Action:
            - connect:ListQueues
            - connect:DescribeInstance
            - connect:GetCurrentMetricData
            - connect:GetMetricData
            - connect:GetMetricDataV2
            - connect:GetCurrentUserData
          Resource: "*"

        - Effect: Allow
          Action:
            - kinesis:PutRecords
          Resource:
            - !Sub arn:${AWS::Partition}:kinesis:${AWS::Region}:${AWS::AccountId}:stream/${KinesisStreamName}

      Events:
        Schedule1:
          Type: Schedule
          Properties:
            Schedule: rate(1 minute)
      Environment:
        Variables:
          CONNECT_INSTANCE_ID:
            Ref: ConnectInstanceId
          KINESIS_STREAM_NAME:
            Ref: KinesisStreamName
Parameters:
  ConnectInstanceId:
    Type: String
    Description: UUID of the Connect instance
  KinesisStreamName:
    Type: String
    Description: The Kinesis stream name that was configured to send all Connect metrics
